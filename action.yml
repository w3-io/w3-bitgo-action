name: 'W3 BitGo Action'
description: 'BitGo institutional custody and signing — wallet management, TSS + multi-sig transactions, policy approval workflows, and webhook registration for W3 workflows.'
author: 'w3-io'

inputs:
  command:
    description: >
      Operation to perform. Wallets: list-wallets, get-wallet, create-wallet,
      share-wallet, freeze-wallet, get-balance, list-addresses. Transactions:
      build-transaction, send-transaction, send-many, accelerate-transaction,
      get-transaction, list-transactions, consolidate, sweep. Policy and
      approval: list-policies, set-policy-rule, remove-policy-rule,
      list-pending-approvals, approve-pending, reject-pending,
      wait-for-approval. Webhooks: add-webhook, list-webhooks, remove-webhook.
    required: true

  # Authentication
  access-token:
    description: 'BitGo access token (sent as Bearer auth)'
    required: true
  enterprise-id:
    description: 'BitGo enterprise ID (required for create/list operations scoped to an enterprise)'
    required: false
  wallet-passphrase:
    description: 'Wallet passphrase used to decrypt the user keychain for signing operations. Required only for tx-signing commands.'
    required: false
  api-url:
    description: 'BitGo API base URL. Default is production; override to https://app.bitgo-test.com/api/v2 for the test environment.'
    required: false
    default: 'https://app.bitgo.com/api/v2'

  # Common path parameters
  coin:
    description: 'Coin ticker (btc, eth, sol, ltc, etc.). BitGo supports the full coin catalog; this value is passed through to the API.'
    required: false
  wallet-id:
    description: 'Wallet ID'
    required: false

  # Transaction inputs
  address:
    description: 'Destination address for send/sweep'
    required: false
  amount:
    description: 'Amount in base units (satoshis for BTC, wei for ETH, lamports for SOL, etc.)'
    required: false
  tx-id:
    description: 'Transaction ID for get-transaction / accelerate-transaction'
    required: false
  fee-rate:
    description: 'Fee rate for build-transaction / accelerate-transaction (sat/vB or gwei)'
    required: false
  comment:
    description: 'Optional comment to attach to a transaction'
    required: false

  # Policy + approval
  policy-rule-id:
    description: 'Policy rule ID for remove-policy-rule'
    required: false
  pending-approval-id:
    description: 'Pending approval ID for approve-pending / reject-pending / wait-for-approval'
    required: false
  approval-state:
    description: 'Target state for approve-pending / reject-pending (approved | rejected). Defaults match the command.'
    required: false

  # wait-for-approval (Layer 2)
  timeout:
    description: 'Polling timeout in seconds for wait-for-approval (default 300, max 3600)'
    required: false
    default: '300'

  # Layer 3 — webhook auto-registration on send
  register-webhook-on-pending:
    description: 'If set to "true" and send-transaction returns a pending approval, automatically register a webhook against the supplied webhook-url so the resolution can fire a follow-up workflow.'
    required: false
    default: 'false'

  # Webhooks
  webhook-url:
    description: 'Webhook callback URL for add-webhook / register-webhook-on-pending'
    required: false
  webhook-id:
    description: 'Webhook ID for remove-webhook'
    required: false
  webhook-type:
    description: 'Webhook event type (transfer, pendingApproval, address_confirmation). Default: pendingApproval'
    required: false
    default: 'pendingApproval'

  # Sharing
  share-with-user:
    description: 'BitGo user ID to share a wallet with (share-wallet)'
    required: false
  share-permissions:
    description: 'Comma-separated permissions for share-wallet (view, spend, admin)'
    required: false

  # Pagination
  limit:
    description: 'Result limit for list operations'
    required: false
  prev-id:
    description: 'Pagination cursor for list operations'
    required: false

  # Escape hatch for rich nested input (set-policy-rule, send-many, create-wallet)
  body:
    description: 'JSON body for commands that need rich input (policy rules, send-many recipients, create-wallet config). Parsed and forwarded.'
    required: false

  # Optional correlation ID — pass-through if you want a specific ID, otherwise the action generates a UUID
  correlation-id:
    description: 'Optional correlation ID embedded in BitGo metadata so a future webhook can match the approval back to the workflow that initiated it. If omitted, the action generates one.'
    required: false

outputs:
  result:
    description: 'JSON result of the operation. Schema documented per command in docs/guide.md.'

runs:
  using: 'node20'
  main: 'dist/index.js'
