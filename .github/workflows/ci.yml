name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@w3-io'

      # NOTE: This currently fails with 403 read_package because
      # @w3-io/action-core is a private package in w3-io/action-core
      # and this repo (w3-bitgo-action) is public. The default
      # GITHUB_TOKEN does not have cross-repo package read access.
      # Fix: an admin needs to add w3-bitgo-action to the package's
      # "Manage Actions access" list at
      # https://github.com/orgs/w3-io/packages/npm/package/action-core/settings
      # All other w3 actions hit the same issue — same fix benefits the
      # whole ecosystem.
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Standards lint
        run: npx @w3-io/action-lint@latest

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          git diff --exit-code dist/ || {
            echo "dist/ is out of date. Run 'npm run build' and commit."
            exit 1
          }
